<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Glyde — 3D Map</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c28;
  --border: #2a2a3d;
  --accent: #7c3aed;
  --neon: #a78bfa;
  --green: #10b981;
  --amber: #f59e0b;
  --red: #ef4444;
  --text: #f1f0ff;
  --muted: #6b6b8a;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 50;
}
.logo { font-family:'Space Mono',monospace; font-size:16px; font-weight:700; color:var(--neon); }
.logo span { color:var(--muted); }
.live-pill {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700; color: var(--green);
  font-family: 'Space Mono', monospace;
}
.live-dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* MAP WRAPPER */
.map-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #06060c;
  perspective: 900px;
}

canvas {
  position: absolute;
  top: 0; left: 0;
  transform-origin: 50% 30%;
  transform: rotateX(52deg) translateY(60px);
  cursor: grab;
}
canvas:active { cursor: grabbing; }

/* COMPASS */
.compass {
  position: absolute;
  top: 16px; right: 16px;
  width: 54px; height: 54px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  z-index: 20;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.compass-inner {
  width: 36px; height: 36px;
  position: relative;
}
.compass-n {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  font-size: 10px; font-weight: 700; color: var(--red);
  font-family: 'Space Mono', monospace;
}
.compass-needle {
  position: absolute;
  top: 50%; left: 50%;
  width: 3px; height: 16px;
  background: linear-gradient(var(--red) 50%, #555 50%);
  transform-origin: 50% 100%;
  transform: translate(-50%, -100%) rotate(0deg);
  border-radius: 2px;
  transition: transform 0.3s ease;
}

/* FRIEND NAV CARD */
.nav-card {
  position: absolute;
  bottom: 100px; left: 16px; right: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 16px;
  z-index: 20;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.nav-card.active { display: block; }
.nav-card-top {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.nav-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; border: 2px solid;
  flex-shrink: 0;
}
.nav-info { flex: 1; }
.nav-name { font-size: 15px; font-weight: 700; }
.nav-sublabel { font-size: 11px; color: var(--muted); margin-top: 1px; }
.nav-dist-badge {
  font-family: 'Space Mono', monospace;
  font-size: 14px; font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  background: rgba(124,58,237,0.15);
  color: var(--neon);
  border: 1px solid rgba(124,58,237,0.3);
}

/* DIRECTION ARROW */
.direction-arrow {
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px;
}
.arrow-wrap {
  position: relative;
  width: 64px; height: 64px;
  display: flex; align-items: center; justify-content: center;
}
.arrow-ring {
  position: absolute;
  width: 64px; height: 64px;
  border-radius: 50%;
  border: 2px solid rgba(167,139,250,0.2);
}
.arrow-svg {
  transition: transform 0.4s ease;
  filter: drop-shadow(0 0 8px rgba(167,139,250,0.6));
}

.nav-cancel-btn {
  width: 100%;
  padding: 9px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--muted);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.nav-cancel-btn:hover { border-color: var(--red); color: var(--red); }

/* BOTTOM BAR */
.bottom-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 10px 12px;
  display: flex;
  gap: 8px;
  z-index: 20;
}

.friend-chip {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 8px 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.friend-chip:hover, .friend-chip.active {
  border-color: var(--accent);
  background: rgba(124,58,237,0.1);
}
.chip-emoji { font-size: 18px; }
.chip-info { flex: 1; min-width: 0; }
.chip-name { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chip-dist { font-size: 10px; color: var(--muted); font-family:'Space Mono',monospace; }

/* MAP CONTROLS */
.map-controls {
  position: absolute;
  top: 16px; left: 16px;
  display: flex; flex-direction: column; gap: 6px;
  z-index: 20;
}
.map-btn {
  width: 38px; height: 38px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  font-family: 'Space Grotesk', sans-serif;
}
.map-btn:hover { border-color: var(--neon); color: var(--neon); }

/* TOAST */
.toast {
  position: fixed; top: 66px; left: 50%;
  transform: translateX(-50%) translateY(-8px);
  background: var(--surface);
  border: 1px solid var(--green);
  color: var(--green);
  padding: 8px 16px;
  border-radius: 10px;
  font-size: 13px; font-weight: 600;
  z-index: 999; opacity: 0;
  transition: all 0.25s;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* LABEL TAG */
.map-label {
  position: absolute;
  top: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(124,58,237,0.2);
  border: 1px solid rgba(124,58,237,0.4);
  color: var(--neon);
  font-size: 11px; font-weight: 700;
  padding: 4px 12px; border-radius: 20px;
  font-family: 'Space Mono', monospace;
  letter-spacing: 0.5px;
  z-index: 20;
  pointer-events: none;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Glyde<span>.app</span></div>
  <div style="font-size:13px;font-weight:600;color:var(--text)">3D Map</div>
  <div class="live-pill"><div class="live-dot"></div>LIVE</div>
</div>

<div class="map-wrap" id="mapWrap">
  <canvas id="c"></canvas>

  <div class="map-label">🎪 HORIZON FESTIVAL 2026</div>

  <div class="map-controls">
    <button class="map-btn" onclick="zoom(1.2)">+</button>
    <button class="map-btn" onclick="zoom(0.8)">−</button>
    <button class="map-btn" onclick="resetView()">◎</button>
  </div>

  <div class="compass" id="compass">
    <div class="compass-inner">
      <div class="compass-n">N</div>
      <div class="compass-needle" id="needle"></div>
    </div>
  </div>

  <!-- NAV CARD -->
  <div class="nav-card" id="navCard">
    <div class="nav-card-top">
      <div class="nav-avatar" id="navAvatar">🦋</div>
      <div class="nav-info">
        <div class="nav-name" id="navName">Maya</div>
        <div class="nav-sublabel" id="navSub">Near Main Stage</div>
      </div>
      <div class="nav-dist-badge" id="navDist">45m</div>
    </div>
    <div class="direction-arrow">
      <div class="arrow-wrap">
        <div class="arrow-ring"></div>
        <svg class="arrow-svg" id="arrowSvg" width="40" height="40" viewBox="0 0 40 40">
          <polygon points="20,4 34,32 20,26 6,32" fill="#a78bfa" opacity="0.95"/>
          <polygon points="20,4 34,32 20,26 6,32" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
        </svg>
      </div>
    </div>
    <button class="nav-cancel-btn" onclick="cancelNav()">Stop navigating</button>
  </div>

  <div class="bottom-bar" id="bottomBar"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const FRIENDS = [
  { id:1, name:'Maya',   emoji:'🦋', color:'#f472b6', x:0.42, y:0.38, loc:'Near Main Stage', dist:'45m' },
  { id:2, name:'Jordan', emoji:'🔥', color:'#fb923c', x:0.61, y:0.55, loc:'Food Village',    dist:'120m' },
  { id:3, name:'Sam',    emoji:'⚡', color:'#facc15', x:0.29, y:0.62, loc:'West Toilets',    dist:'210m' },
];

const ZONES = [
  { label:'MAIN STAGE',   x:0.50, y:0.18, w:0.28, h:0.12, color:'#7c3aed', icon:'🎵', h3d:28 },
  { label:'EAST STAGE',   x:0.76, y:0.42, w:0.16, h:0.09, color:'#7c3aed', icon:'🎵', h3d:20 },
  { label:'WEST STAGE',   x:0.14, y:0.42, w:0.16, h:0.09, color:'#7c3aed', icon:'🎵', h3d:20 },
  { label:'FOOD VILLAGE', x:0.60, y:0.54, w:0.14, h:0.08, color:'#f59e0b', icon:'🍔', h3d:10 },
  { label:'MEDICAL',      x:0.50, y:0.60, w:0.09, h:0.06, color:'#ef4444', icon:'🏥', h3d:8  },
  { label:'TOILETS',      x:0.28, y:0.62, w:0.07, h:0.06, color:'#06b6d4', icon:'🚻', h3d:6  },
  { label:'TOILETS',      x:0.66, y:0.62, w:0.07, h:0.06, color:'#06b6d4', icon:'🚻', h3d:6  },
  { label:'WATER',        x:0.38, y:0.50, w:0.05, h:0.05, color:'#10b981', icon:'💧', h3d:4  },
  { label:'WATER',        x:0.58, y:0.50, w:0.05, h:0.05, color:'#10b981', icon:'💧', h3d:4  },
];

const PATHS = [
  [[0.2,0.32],[0.5,0.32],[0.8,0.32]],
  [[0.5,0.32],[0.5,0.82]],
  [[0.2,0.32],[0.2,0.75],[0.5,0.82]],
  [[0.8,0.32],[0.8,0.75],[0.5,0.82]],
  [[0.2,0.54],[0.8,0.54]],
];

// ── STATE ─────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let scale = 1;
let panX = 0, panY = 0;
let myX = 0.50, myY = 0.65;
let navigatingTo = null;
let heading = 0; // compass degrees
let friendT = FRIENDS.map(()=>Math.random()*100);
let lastTime = 0;

function resize() {
  const wrap = document.getElementById('mapWrap');
  W = wrap.clientWidth;
  H = wrap.clientHeight * 1.6;
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
}

// ── COORDINATE SYSTEM ────────────────────────────────────────────────────────
function s(rx, ry) {
  return {
    x: panX + rx * W * scale,
    y: panY + ry * H * scale
  };
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw(ts) {
  const dt = ts - lastTime; lastTime = ts;
  ctx.clearRect(0, 0, W, H);

  // Sky gradient background
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.3);
  sky.addColorStop(0, '#06060c');
  sky.addColorStop(1, '#0d0d1a');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Ground
  const ground = ctx.createLinearGradient(0, H*0.1, 0, H);
  ground.addColorStop(0, '#0f0f1e');
  ground.addColorStop(1, '#080810');
  ctx.fillStyle = ground;
  ctx.fillRect(0, H*0.1, W, H);

  // Grid lines on ground
  ctx.strokeStyle = 'rgba(42,42,80,0.4)';
  ctx.lineWidth = 1;
  for (let gx = 0; gx <= 10; gx++) {
    const p = s(gx/10, 0.05);
    const p2 = s(gx/10, 1.0);
    ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
  }
  for (let gy = 0; gy <= 10; gy++) {
    const p = s(0, gy/10);
    const p2 = s(1, gy/10);
    ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
  }

  // Venue boundary glow
  const vtl = s(0.04,0.06), vbr = s(0.96,0.94);
  ctx.strokeStyle = 'rgba(124,58,237,0.5)';
  ctx.lineWidth = 2;
  ctx.setLineDash([10,5]);
  ctx.strokeRect(vtl.x,vtl.y,vbr.x-vtl.x,vbr.y-vtl.y);
  ctx.setLineDash([]);

  // Paths / roads
  PATHS.forEach(pts => {
    ctx.strokeStyle = 'rgba(160,160,220,0.18)';
    ctx.lineWidth = 18 * scale;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    pts.forEach(([rx,ry],i)=>{ const p=s(rx,ry); i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y); });
    ctx.stroke();
    // Dashed centre line
    ctx.strokeStyle = 'rgba(120,120,180,0.15)';
    ctx.lineWidth = 2 * scale;
    ctx.setLineDash([12,10]);
    ctx.beginPath();
    pts.forEach(([rx,ry],i)=>{ const p=s(rx,ry); i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y); });
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Navigation line
  if (navigatingTo) {
    const me = s(myX, myY), dest = s(navigatingTo.x, navigatingTo.y);
    ctx.strokeStyle = 'rgba(167,139,250,0.9)';
    ctx.lineWidth = 3 * scale;
    ctx.setLineDash([14,8]);
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(me.x,me.y); ctx.lineTo(dest.x,dest.y); ctx.stroke();
    ctx.setLineDash([]);
    // Pulse dot at destination
    const pulse = (ts%1200)/1200;
    ctx.beginPath();
    ctx.arc(dest.x, dest.y, (12+pulse*10)*scale, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(167,139,250,${0.6-pulse*0.6})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // 3D Buildings / zones
  ZONES.forEach(z => {
    const bh = z.h3d * scale;
    const tl = s(z.x - z.w/2, z.y - z.h/2);
    const br = s(z.x + z.w/2, z.y + z.h/2);
    const bw = br.x - tl.x, bd = br.y - tl.y;

    // Right face (shadow)
    ctx.fillStyle = z.color + '30';
    ctx.beginPath();
    ctx.moveTo(br.x, tl.y);
    ctx.lineTo(br.x + bh*0.5, tl.y - bh*0.5);
    ctx.lineTo(br.x + bh*0.5, br.y - bh*0.5);
    ctx.lineTo(br.x, br.y);
    ctx.closePath();
    ctx.fill();

    // Top face
    ctx.fillStyle = z.color + '25';
    ctx.strokeStyle = z.color + '60';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(tl.x, tl.y);
    ctx.lineTo(br.x, tl.y);
    ctx.lineTo(br.x + bh*0.5, tl.y - bh*0.5);
    ctx.lineTo(tl.x + bh*0.5, tl.y - bh*0.5);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // Front face
    ctx.fillStyle = z.color + '18';
    ctx.strokeStyle = z.color + '70';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(tl.x, tl.y);
    ctx.lineTo(br.x, tl.y);
    ctx.lineTo(br.x, br.y);
    ctx.lineTo(tl.x, br.y);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // Icon + label on front face
    const cx = (tl.x + br.x) / 2, cy = (tl.y + br.y) / 2;
    ctx.font = `${Math.max(12, 16*scale)}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = z.color;
    ctx.fillText(z.icon, cx, cy - 5);
    ctx.font = `bold ${Math.max(8,10*scale)}px Space Grotesk,sans-serif`;
    ctx.fillStyle = z.color + 'cc';
    ctx.fillText(z.label, cx, cy + 10);
  });

  // Friends
  friendT = friendT.map((t,i) => {
    const newT = t + 0.004;
    const f = FRIENDS[i];
    const wobX = Math.sin(newT*2.1)*0.009;
    const wobY = Math.cos(newT*1.8)*0.007;
    const p = s(f.x + wobX, f.y + wobY);

    // Shadow on ground
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(p.x, p.y+4, 10*scale, 4*scale, 0, 0, Math.PI*2);
    ctx.fill();

    // Glow
    const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,22*scale);
    g.addColorStop(0, f.color+'66'); g.addColorStop(1,'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(p.x,p.y,22*scale,0,Math.PI*2); ctx.fill();

    // Body
    ctx.fillStyle = '#1c1c28'; ctx.strokeStyle = f.color; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(p.x,p.y,15*scale,0,Math.PI*2); ctx.fill(); ctx.stroke();

    // Emoji
    ctx.font = `${13*scale}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(f.emoji, p.x, p.y);

    // Name tag
    ctx.font = `bold ${9*scale}px Space Grotesk,sans-serif`;
    ctx.fillStyle = '#13131a';
    const tw = ctx.measureText(f.name).width;
    ctx.fillRect(p.x-tw/2-4, p.y+18*scale, tw+8, 14*scale);
    ctx.fillStyle = f.color;
    ctx.textBaseline = 'top';
    ctx.fillText(f.name, p.x, p.y+19*scale);

    return newT;
  });

  // ME
  const me = s(myX, myY);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(me.x, me.y+5, 12*scale, 5*scale, 0, 0, Math.PI*2);
  ctx.fill();

  // GPS pulse ring
  const pulse = (ts%1800)/1800;
  ctx.beginPath();
  ctx.arc(me.x, me.y, (18+pulse*18)*scale, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(16,185,129,${0.5-pulse*0.5})`;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Body
  ctx.fillStyle = '#0a0a0f'; ctx.strokeStyle = '#10b981'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(me.x,me.y,15*scale,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // Direction cone
  const coneAngle = (heading * Math.PI / 180);
  ctx.fillStyle = 'rgba(16,185,129,0.2)';
  ctx.beginPath();
  ctx.moveTo(me.x, me.y);
  ctx.arc(me.x, me.y, 35*scale, coneAngle - 0.4, coneAngle + 0.4);
  ctx.closePath();
  ctx.fill();

  // Arrow on top of me
  ctx.save();
  ctx.translate(me.x, me.y);
  ctx.rotate(coneAngle);
  ctx.fillStyle = '#10b981';
  ctx.beginPath();
  ctx.moveTo(0,-22*scale);
  ctx.lineTo(-5*scale,-14*scale);
  ctx.lineTo(5*scale,-14*scale);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  ctx.font = `bold ${9*scale}px Space Grotesk,sans-serif`;
  ctx.fillStyle = '#10b981'; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText('YOU', me.x, me.y+18*scale);

  // Update compass + direction arrow
  heading = (heading + 0.3) % 360; // demo rotation — real device uses DeviceOrientation
  document.getElementById('needle').style.transform = `translate(-50%,-100%) rotate(${heading}deg)`;
  if (navigatingTo) updateDirectionArrow();

  requestAnimationFrame(draw);
}

// ── DIRECTION ARROW ───────────────────────────────────────────────────────────
function updateDirectionArrow() {
  if (!navigatingTo) return;
  const dx = navigatingTo.x - myX;
  const dy = navigatingTo.y - myY;
  const angleDeg = Math.atan2(dy, dx) * 180 / Math.PI + 90;
  document.getElementById('arrowSvg').style.transform = `rotate(${angleDeg}deg)`;
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function navigateTo(friend) {
  navigatingTo = friend;
  document.getElementById('navCard').classList.add('active');
  document.getElementById('navAvatar').textContent = friend.emoji;
  document.getElementById('navAvatar').style.borderColor = friend.color;
  document.getElementById('navAvatar').style.background = friend.color + '22';
  document.getElementById('navName').textContent = friend.name;
  document.getElementById('navName').style.color = friend.color;
  document.getElementById('navSub').textContent = friend.loc;
  document.getElementById('navDist').textContent = friend.dist;
  updateDirectionArrow();
  showToast(`Navigating to ${friend.emoji} ${friend.name}`);

  // Highlight chip
  document.querySelectorAll('.friend-chip').forEach(c=>c.classList.remove('active'));
  document.querySelector(`[data-id="${friend.id}"]`)?.classList.add('active');
}

function cancelNav() {
  navigatingTo = null;
  document.getElementById('navCard').classList.remove('active');
  document.querySelectorAll('.friend-chip').forEach(c=>c.classList.remove('active'));
}

// ── ZOOM / PAN ────────────────────────────────────────────────────────────────
function zoom(factor) {
  scale = Math.min(Math.max(scale * factor, 0.5), 3);
}
function resetView() { scale=1; panX=0; panY=0; }

let drag=false, lastDx, lastDy;
canvas.addEventListener('mousedown',e=>{drag=true;lastDx=e.clientX;lastDy=e.clientY;});
canvas.addEventListener('mousemove',e=>{ if(!drag)return; panX+=e.clientX-lastDx; panY+=e.clientY-lastDy; lastDx=e.clientX; lastDy=e.clientY; });
canvas.addEventListener('mouseup',()=>drag=false);
canvas.addEventListener('mouseleave',()=>drag=false);
canvas.addEventListener('touchstart',e=>{ const t=e.touches[0]; drag=true; lastDx=t.clientX; lastDy=t.clientY; },{passive:true});
canvas.addEventListener('touchmove',e=>{ if(!drag)return; const t=e.touches[0]; panX+=t.clientX-lastDx; panY+=t.clientY-lastDy; lastDx=t.clientX; lastDy=t.clientY; },{passive:true});
canvas.addEventListener('touchend',()=>drag=false);
canvas.addEventListener('wheel',e=>{ e.preventDefault(); zoom(e.deltaY<0?1.1:0.9); },{passive:false});

// ── BOTTOM BAR ────────────────────────────────────────────────────────────────
function renderBottomBar() {
  document.getElementById('bottomBar').innerHTML = FRIENDS.map(f=>`
    <div class="friend-chip" data-id="${f.id}" onclick="navigateTo(${JSON.stringify(f).replace(/"/g,'&quot;')})">
      <div class="chip-emoji">${f.emoji}</div>
      <div class="chip-info">
        <div class="chip-name" style="color:${f.color}">${f.name}</div>
        <div class="chip-dist">${f.dist} away</div>
      </div>
    </div>
  `).join('');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
resize();
window.addEventListener('resize', resize);
renderBottomBar();
requestAnimationFrame(draw);

// Device orientation for real compass
if (window.DeviceOrientationEvent) {
  window.addEventListener('deviceorientation', e => {
    if (e.alpha !== null) heading = e.alpha;
  });
}
</script>
